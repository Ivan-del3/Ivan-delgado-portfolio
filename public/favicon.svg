<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Fondo oscuro del portfolio -->
  <rect width="64" height="64" rx="9" fill="#22233A"/>

  <!-- Arco trasero de la órbita (más opaco, detrás de las letras) -->
  <g transform="rotate(-22 32 32)">
    <path d="M9 32 A23 7.5 0 0 1 55 32"
          fill="none" stroke="#f0ece9" stroke-width="2" stroke-opacity="0.4"
          stroke-linecap="round"/>
  </g>

  <!-- Letra I con serifs -->
  <rect x="17"   y="12"  width="11"  height="3"  fill="#f0ece9" rx="0.5"/>
  <rect x="21"   y="12"  width="3.5" height="40" fill="#f0ece9"/>
  <rect x="17"   y="49"  width="11"  height="3"  fill="#f0ece9" rx="0.5"/>

  <!-- Letra D: forma exterior rellena -->
  <path d="M24.5 12 L30 12 C44.5 12 52 21.5 52 32 C52 42.5 44.5 52 30 52 L24.5 52 Z"
        fill="#f0ece9"/>
  <!-- Letra D: hueco interior (recorte con color de fondo) -->
  <path d="M28.5 17 C39.5 17 47 23.5 47 32 C47 40.5 39.5 47 28.5 47 Z"
        fill="#22233A"/>

  <!-- Arco delantero de la órbita (encima de las letras) -->
  <g transform="rotate(-22 32 32)">
    <path d="M9 32 A23 7.5 0 0 0 55 32"
          fill="none" stroke="#f0ece9" stroke-width="2"
          stroke-linecap="round"/>
  </g>
</svg>

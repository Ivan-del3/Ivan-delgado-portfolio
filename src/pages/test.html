<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sobre mí - Ivan Delgado</title>
  <style>
    /* Reset básico */
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }

    body {
      background-color: #f9f9f9;
      color: #111;
    }

    .hero {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      padding: 50px 20px;
      min-height: 100vh;
    }

    .hero .photo {
      flex: 1 1 250px;
      max-width: 250px;
      margin: 20px;
      border-radius: 50%;
      overflow: hidden;
      border: 5px solid #007BFF;
    }

    .hero .photo img {
      width: 100%;
      display: block;
    }

    .hero .content {
      flex: 2 1 400px;
      margin: 20px;
    }

    .hero h1 {
      font-size: 2.5rem;
      margin-bottom: 10px;
      color: #007BFF;
    }

    .hero h2 {
      font-size: 1.3rem;
      margin-bottom: 20px;
      font-weight: 400;
      color: #333;
    }

    .hero p {
      font-size: 1rem;
      line-height: 1.6;
      margin-bottom: 20px;
    }

    .skills {
      margin-bottom: 20px;
    }

    .skills span {
      display: inline-block;
      background-color: #e0e0e0;
      color: #333;
      padding: 5px 10px;
      margin: 5px 5px 0 0;
      border-radius: 5px;
      font-size: 0.9rem;
    }

    .cta button {
      background-color: #007BFF;
      color: #fff;
      border: none;
      padding: 10px 20px;
      margin-right: 10px;
      border-radius: 5px;
      cursor: pointer;
      transition: background-color 0.3s;
      font-size: 1rem;
    }

    .cta button:hover {
      background-color: #0056b3;
    }

    @media (max-width: 768px) {
      .hero {
        flex-direction: column;
      }

      .hero .photo, .hero .content {
        flex: unset;
        max-width: 90%;
      }
    }
  </style>
</head>
<body>

  <section class="hero">
    <div class="photo">
      <img src="https://via.placeholder.com/250" alt="Foto de Ivan Delgado">
    </div>

    <div class="content">
      <h1>Ivan Delgado</h1>
      <h2>Desarrollador Web Frontend | React & Astro</h2>

      <p>Soy un desarrollador apasionado por transformar ideas en aplicaciones web modernas. 
      Me especializo en Frontend con Astro y React, creando interfaces limpias y eficientes.</p>

      <div class="skills">
        <span>HTML</span>
        <span>CSS</span>
        <span>JavaScript</span>
        <span>TypeScript</span>
        <span>React</span>
        <span>Astro</span>
        <span>Tailwind</span>
        <span>Git</span>
        <span>GitHub</span>
      </div>

      <div class="cta">
        <button onclick="alert('Ir a Portfolio')">Ver mis proyectos</button>
        <button onclick="window.open('https://github.com/Ivan-del3','_blank')">Mi GitHub</button>
        <button onclick="alert('Descargar CV')">Descargar CV</button>
      </div>
    </div>
  </section>

</body>
</html>
